services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: a2-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: a2-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  jupyter-spark:
    build:
      context: .
      dockerfile: docker/jupyter-spark/Dockerfile
    container_name: a2-jupyter-spark
    depends_on:
      - kafka
    ports:
      - "8888:8888"
      - "4040:4040"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:8888/api?token=' + os.environ.get('JUPYTER_TOKEN', 'a2-demo'), timeout=5).read()\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN:-a2-demo}
      KAFKA_INTERNAL_BOOTSTRAP: ${KAFKA_INTERNAL_BOOTSTRAP:-kafka:9092}
      KAFKA_EXTERNAL_BOOTSTRAP: ${KAFKA_EXTERNAL_BOOTSTRAP:-localhost:29092}
      MPLCONFIGDIR: /tmp/matplotlib
      IPYTHONDIR: /tmp/ipython
      PYSPARK_SUBMIT_ARGS: "--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,org.apache.spark:spark-streaming-kafka-0-10_2.12:3.5.0 pyspark-shell"
    volumes:
      - .:/home/student/A2
    working_dir: /home/student/A2
